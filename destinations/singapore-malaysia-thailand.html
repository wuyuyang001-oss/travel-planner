<style>
/* ====== Trip-specific styles (timeline, map, POI cards) ====== */

html, body { height: 100%; overflow: hidden; }
body { display: flex; flex-direction: column; }

/* === Tabs === */
.tabs-bar {
  background: var(--color-surface); border-bottom: 1px solid var(--color-border);
  display: flex; gap: 0; padding: 0 40px; flex-shrink: 0; overflow-x: auto;
}
.tab-btn {
  padding: 12px 22px; border: none; background: none; cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--color-text-secondary);
  border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
}
.tab-btn:hover { color: var(--color-primary); }
.tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
.tab-day { font-size: 10px; color: var(--color-text-muted); display: block; margin-bottom: 1px; }
.tab-city { font-size: 13px; }

/* === Main Layout === */
.main-layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* === Timeline Panel === */
.timeline-panel {
  width: 480px; min-width: 420px; background: var(--color-surface);
  overflow-y: auto; overflow-x: hidden; padding: 0 0 16px;
  border-right: 1px solid var(--color-border); flex-shrink: 0;
}
.timeline-panel::-webkit-scrollbar { width: 4px; }
.timeline-panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

.day-header { padding: 14px 28px; border-bottom: 1px solid var(--color-border-light); }
.day-header h3 { font-size: 15px; font-weight: 700; color: var(--color-text); }
.day-header .day-date { font-size: 11px; color: var(--color-text-muted); margin-left: 8px; }
.day-header .day-summary { font-size: 12px; color: var(--color-text-muted); margin-top: 3px; }

/* === Travel Note === */
.travel-note {
  margin: 8px 20px; padding: 12px 16px;
  background: linear-gradient(135deg, #eff6ff, #f0f4ff);
  border: 1px solid #dbeafe; border-radius: 10px;
  display: flex; align-items: center; gap: 12px;
}
.travel-note-icon { font-size: 20px; flex-shrink: 0; }
.travel-note-text { font-size: 12px; color: #1e40af; line-height: 1.5; }
.travel-note-text strong { color: #1e3a8a; }

/* === Accommodation Card === */
.acc-card {
  margin: 10px 20px 6px; padding: 14px 16px;
  background: linear-gradient(135deg, #fefce8, #fffbeb);
  border: 1px solid #fde68a; border-radius: 10px;
  display: flex; gap: 12px; align-items: flex-start;
}
.acc-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.acc-info { flex: 1; }
.acc-name { font-size: 13px; font-weight: 700; color: #92400e; }
.acc-detail { font-size: 11px; color: #a16207; margin-top: 2px; line-height: 1.4; }
.acc-price {
  font-size: 13px; font-weight: 800; color: #b45309;
  background: #fef3c7; padding: 4px 10px; border-radius: 6px; white-space: nowrap;
}

/* === Timeline Item === */
.tl-item {
  display: flex; align-items: flex-start;
  padding: 10px 28px; position: relative; cursor: pointer;
  transition: background 0.15s; border-left: 3px solid transparent;
}
.tl-item:hover { background: #f8fafc; }
.tl-item.active-card { background: #f0f4ff; border-left-color: var(--color-primary-light); }

.tl-time-col { width: 48px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; position: relative; }
.tl-time { font-size: 10px; font-weight: 700; color: var(--color-text-secondary); background: var(--color-border-light); border-radius: 5px; padding: 2px 8px; white-space: nowrap; }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; position: relative; z-index: 1; }
.tl-line { flex: 1; width: 1.5px; background: #e5e7eb; margin-top: 5px; min-height: 20px; }
.tl-item:last-child .tl-line { background: transparent; }

.tl-content { flex: 1; margin-left: 12px; min-width: 0; }
.tl-name { font-size: 13px; font-weight: 600; color: var(--color-text); margin-bottom: 2px; line-height: 1.3; }
.tl-desc { font-size: 11px; color: var(--color-text-muted); line-height: 1.4; margin-bottom: 4px; }

.tl-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.tl-cat { font-size: 10px; font-weight: 600; padding: 1px 8px; border-radius: 100px; }
.cat-sightseeing { background: #dbeafe; color: #1d4ed8; }
.cat-food { background: #fef3c7; color: #b45309; }
.cat-culture { background: #ede9fe; color: #6d28d9; }
.cat-shopping { background: #fce7f3; color: #be185d; }

.tl-transit {
  font-size: 10px; color: var(--color-text-muted);
  display: flex; align-items: center; gap: 5px; padding: 3px 0;
}

/* === Map Panel === */
.map-panel { flex: 1; position: relative; overflow: hidden; }
#mapContainer { width: 100%; height: 100%; }

/* === Numbered Markers === */
.num-marker { width: 30px !important; height: 30px !important; background: transparent !important; border: none !important; }
.num-marker-inner {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25); border: 2.5px solid #fff;
}

/* === Leaflet Overrides === */
.leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-size: 13px; }

/* === Map Legend === */
.map-legend {
  position: absolute; bottom: 16px; left: 16px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
  border-radius: 10px; padding: 10px 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); z-index: 1000;
  display: flex; gap: 14px; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #4b5563; font-weight: 500; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* === Responsive === */
@media (max-width: 900px) {
  .main-layout { flex-direction: column; }
  .timeline-panel { width: 100%; min-width: unset; max-height: 45%; }
  .tabs-bar { padding: 0 12px; }
  .tl-item { padding: 8px 16px; }
  .day-header, .acc-card, .travel-note { margin-left: 12px; margin-right: 12px; }
}

/* === Animations === */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.tl-item { animation: fadeIn 0.25s ease forwards; }
.tl-item:nth-child(1) { animation-delay: 0.03s; }
.tl-item:nth-child(2) { animation-delay: 0.08s; }
.tl-item:nth-child(3) { animation-delay: 0.13s; }
.tl-item:nth-child(4) { animation-delay: 0.18s; }
.tl-item:nth-child(5) { animation-delay: 0.23s; }
</style>

esc":"最出片的彩色帐篷夜市！火山排骨/西瓜冰沙，离开前的最后狂欢","transit":{"from":"上一站","mode":"🚇MRT","dist":"5km","dur":"15分钟"}}]}]};

// ============================================================
// Map & Timeline Logic
// ============================================================
var CAT_COLORS = { '景点':'#3b82f6', '美食':'#f59e0b', '文化':'#8b5cf6', '购物':'#ec4899' };
var CAT_CLASS = { '景点':'cat-sightseeing', '美食':'cat-food', '文化':'cat-culture', '购物':'cat-shopping' };
var DAY_BOUNDS = {
  1: [[1.27,103.82],[1.32,103.90]],
  2: [[1.24,103.81],[1.33,103.90]],
  3: [[3.13,101.68],[3.18,101.73]],
  4: [[3.13,101.67],[3.25,101.73]],
  5: [[13.70,100.46],[13.80,100.53]],
  6: [[13.66,100.46],[13.84,100.60]],
  7: [[13.70,100.48],[13.80,100.60]]
};
var DAY_CENTERS = {
  1:[1.288,103.855], 2:[1.285,103.855],
  3:[3.150,101.704], 4:[3.170,101.700],
  5:[13.750,100.493], 6:[13.750,100.520], 7:[13.745,100.530]
};

var currentDay = 1;
var map = null;
var currentMarkers = [];
var currentPolyline = null;

function buildTabs() {
  document.getElementById('tabsBar').innerHTML = TRIP_DATA.days.map(function(d,i) {
    return '<button class="tab-btn'+(i===0?' active':'')+'" data-day="'+d.id+'" onclick="switchDay('+d.id+')">'+
      '<span class="tab-day">DAY '+d.id+'</span>'+
      '<span class="tab-city">'+d.city+'</span>'+
      '</button>';
  }).join('');
}

function buildDayContent(dayId) {
  var day = TRIP_DATA.days[dayId-1];
  var header = '<h3>DAY '+day.id+' · '+day.city+' <span class="day-date">'+day.date+'</span></h3>'+
    '<div class="day-summary">'+day.summary+'</div>';
  document.getElementById('dayHeader').innerHTML = header;

  var html = '';
  if (day.travelNote) {
    html += '<div class="travel-note"><div class="travel-note-icon">'+day.travelNote.icon+'</div>'+
      '<div class="travel-note-text">'+day.travelNote.text+'</div></div>';
  }
  html += '<div class="acc-card">'+
    '<div class="acc-icon">🏨</div>'+
    '<div class="acc-info">'+
    '<div class="acc-name">'+day.accommodation.name+'</div>'+
    '<div class="acc-detail">📍 '+day.accommodation.area+' ｜ '+day.accommodation.note+'</div>'+
    '</div>'+
    '<div class="acc-price">'+day.accommodation.price+'</div>'+
    '</div>';

  day.pois.forEach(function(poi, idx) {
    html += '<div class="tl-item" data-idx="'+idx+'" onclick="focusPOI('+idx+')">'+
      '<div class="tl-time-col">'+
      '<div class="tl-time">'+poi.time+'</div>'+
      '<div class="tl-dot" style="background:'+CAT_COLORS[poi.cat]+';"></div>'+
      '<div class="tl-line"></div>'+
      '</div>'+
      '<div class="tl-content">'+
      '<div class="tl-name">'+(idx+1)+'. '+poi.name+'</div>'+
      '<div class="tl-desc">'+poi.desc+'</div>'+
      '<div class="tl-tags"><span class="tl-cat '+CAT_CLASS[poi.cat]+'">'+poi.cat+'</span></div>'+
      '<div class="tl-transit"><span class="tl-transit-icon">'+poi.transit.mode.split(' ')[0]+'</span> '+
      poi.transit.mode+' ｜ '+poi.transit.from+' → '+poi.transit.dist+' 约'+poi.transit.dur+'</div>'+
      '</div></div>';
  });

  document.getElementById('dayContent').innerHTML = html;
}

function makeNumIcon(color, num) {
  return L.divIcon({
    className: 'num-marker',
    html: '<div class="num-marker-inner" style="background:'+color+';">'+num+'</div>',
    iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -18]
  });
}

function updateMap(dayId) {
  var day = TRIP_DATA.days[dayId-1];
  if (!map) return;

  currentMarkers.forEach(function(m) { map.removeLayer(m); });
  currentMarkers = [];
  if (currentPolyline) { map.removeLayer(currentPolyline); currentPolyline = null; }

  var latlngs = [];
  day.pois.forEach(function(poi, idx) {
    var color = CAT_COLORS[poi.cat];
    var m = L.marker([poi.lat, poi.lng], { icon: makeNumIcon(color, idx+1) }).addTo(map);
    m.bindPopup('<div style="min-width:160px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">'+
      '<h4 style="font-size:13px;font-weight:700;color:#1f2937;margin:0 0 3px;">'+(idx+1)+'. '+poi.name+'</h4>'+
      '<p style="font-size:11px;color:#6b7280;margin:0;line-height:1.4;">'+poi.desc+'</p></div>');
    m.on('click', function() { highlightCard(idx); });
    currentMarkers.push(m);
    latlngs.push([poi.lat, poi.lng]);
  });

  currentPolyline = L.polyline(latlngs, {
    color: '#6366f1', weight: 3, opacity: 0.7,
    dashArray: '8, 6', lineCap: 'round', lineJoin: 'round'
  }).addTo(map);

  var b = DAY_BOUNDS[dayId];
  if (b) { map.fitBounds(L.latLngBounds(b[0], b[1]), { padding: [50, 50] }); }
}

function highlightCard(idx) {
  var cards = document.querySelectorAll('.tl-item');
  cards.forEach(function(c) { c.classList.remove('active-card'); });
  var card = document.querySelector('.tl-item[data-idx="'+idx+'"]');
  if (card) { card.classList.add('active-card'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function focusPOI(idx) {
  var day = TRIP_DATA.days[currentDay-1];
  var poi = day.pois[idx];
  if (!map) return;
  map.flyTo([poi.lat, poi.lng], 16, { duration: 1 });
  if (currentMarkers[idx]) { currentMarkers[idx].openPopup(); }
  highlightCard(idx);
}

function switchDay(dayId) {
  if (currentDay === dayId) return;
  currentDay = dayId;
  var btns = document.querySelectorAll('.tab-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('.tab-btn[data-day="'+dayId+'"]');
  if (btn) btn.classList.add('active');
  buildDayContent(dayId);
  updateMap(dayId);
}

function initMap() {
  map = L.map('mapContainer', {
    center: DAY_CENTERS[1], zoom: 14,
    zoomControl: true, attributionControl: false
  });
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);
  L.control.attribution({
    position: 'bottomright', prefix: false
  }).setPrefix('').addAttribution('&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>').addTo(map);
  setTimeout(function() { map.invalidateSize(); }, 200);
  updateMap(1);
}

// Bootstrap
buildTabs();
buildDayContent(1);
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  setTimeout(initMap, 100);
} else {
  window.addEventListener('load', function() { setTimeout(initMap, 100); });
}
</script>
